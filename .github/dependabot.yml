version: 2
updates:
  # Python deps live in server/ (pyproject.toml + uv.lock). uv uses the pip
  # ecosystem; Dependabot reads pyproject.toml and opens PRs for updates.
  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
    groups:
      # Batch routine bumps into one PR to cut review noise.
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions in .github/workflows pinned-but-current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
